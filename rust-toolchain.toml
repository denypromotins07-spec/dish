[toolchain]
channel = "1.97.0"
components = ["rustfmt", "clippy", "rust-src", "llvm-tools"]
targets = ["x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl"]

[profile]
# Enforce release optimizations for the AMD Ryzen AI 5 target
# Enables AVX2, FMA, and other SIMD instructions specific to Zen 3/Zen 4
opt-level = 3
lto = "thin"
codegen-units = 1
