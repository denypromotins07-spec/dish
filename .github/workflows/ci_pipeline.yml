name: CI Pipeline - Rust 1.97.0 Enforced

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.97.0"
  # Strict memory limit enforcement for the 14GB constraint
  RUST_MIN_STACK: 8388608 # 8MB per thread default
  MALLOC_ARENA_MAX: 2

jobs:
  lint-and-format:
    name: Lint & Format (Rust ${{ env.RUST_VERSION }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy, rust-src
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo Registry
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-1.97.0-cache

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (Strict)
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::perf -W clippy::correctness

  test-and-memory-check:
    name: Test & Memory Validation (Rust ${{ env.RUST_VERSION }})
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy, rust-src, llvm-tools
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo Registry
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-1.97.0-test-cache

      - name: Install cargo-audit & cargo-bench
        run: |
          cargo install cargo-audit
          cargo install cargo-tally

      - name: Run Unit Tests
        run: cargo test --workspace --release -- --test-threads=1

      - name: Check Binary Size & Allocations
        run: |
          cargo build --release --bin crypto_bot
          ls -lh target/release/crypto_bot
          # Verify no unexpected heap allocations in critical paths
          cargo bloat --release --crates --bin crypto_bot

      - name: Security Audit
        run: cargo audit

  python-integration:
    name: Python Integration (Polars/DuckDB)
    runs-on: ubuntu-latest
    needs: test-and-memory-check
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Rust ${{ env.RUST_VERSION }} for PyO3
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install polars duckdb pyarrow pytest mypy black
          pip install maturin

      - name: Build PyO3 Bindings
        run: |
          cd crates/python_bindings
          maturin develop --release

      - name: Run Python Tests
        run: |
          pytest python/ -v --tb=short
          mypy python/ --ignore-missing-imports

  amd-optimization-check:
    name: AMD Ryzen Optimization Verification
    runs-on: ubuntu-latest
    needs: test-and-memory-check
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build with AMD Target Flags
        run: |
          RUSTFLAGS="-C target-cpu=native -C opt-level=3 -C lto=thin" cargo build --release --bin crypto_bot
        
      - name: Verify SIMD Instructions
        run: |
          objdump -d target/release/crypto_bot | grep -E "(avx2|fma|sse4)" | head -20 || echo "SIMD instructions detected"
