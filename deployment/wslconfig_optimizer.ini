# Chapter 5, File 1: WSL2/Docker Configuration Optimizer
# deployment/wslconfig_optimizer.ini
# Strictly configures WSL2 to cap at 2GB RAM and disable networking mirroring

# WSL2 Configuration for HFT Environment
# This file should be placed at: %USERPROFILE%\.wslconfig
# It limits WSL2 memory usage to prevent interference with native Windows HFT processes

[wsl2]
# Memory limit: 2GB hard cap to leave 14GB for Windows + HFT bot (10GB) + OS (6GB)
memory=2GB

# Swap disabled - we want ZERO pagefile usage for latency guarantees
swap=0

# Disable page reporting to prevent WSL2 from claiming unused memory
pageReporting=false

# Limit CPU usage to 2 cores max (leave rest for native Windows processes)
processors=2

# Use legacy networking instead of mirrored networking
# Mirrored networking consumes extra CPU cycles and RAM
networkingMode=nat

# Disable automatic DNS resolution (reduces overhead)
autoProxy=false

# Set localhost forwarding for container access
localhostForwarding=true

# GUI support disabled (no need for X11/Wayland in HFT context)
guiApplications=false

# System root mount disabled for security and performance
systemRootMount=false

[experimental]
# Enable sparse VHD for smaller disk footprint
sparseVhd=true

# Disable GPU acceleration in WSL2 (GPU is for frontend browser only)
directXInterop=false

# Virtualization timeout settings
virtualizationTimeout=30
