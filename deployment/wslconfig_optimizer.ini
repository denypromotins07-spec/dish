# =============================================================================
# WSL2 CONFIGURATION OPTIMIZER - DOCKER DESKTOP MITIGATION
# Strictly caps WSL2 at 2GB RAM, disables networking mirroring
# Prevents Hyper-V virtual switch from consuming CPU/RAM
# =============================================================================

# This file should be placed at: %USERPROFILE%\.wslconfig
# Run: Copy-Item .\deployment\wslconfig_optimizer.ini $env:USERPROFILE\.wslconfig -Force

[wsl2]
# =============================================================================
# MEMORY LIMITS - STRICT 2GB CAP FOR WSL2
# Leaves maximum RAM for native Windows HFT processes
# =============================================================================
memory=2GB
swap=0

# =============================================================================
# PROCESSOR LIMITS
# Restrict WSL2 to minimal CPU resources
# =============================================================================
processors=2

# =============================================================================
# NETWORKING - DISABLE MIRRORING TO REDUCE HYPER-V OVERHEAD
# Uses NAT mode instead of mirrored networking
# =============================================================================
networkingMode=nat
autoProxy=true

# =============================================================================
# PERFORMANCE TUNING - DISABLE UNNECESSARY FEATURES
# =============================================================================
debugConsole=false
localhostForwarding=true

# =============================================================================
# SYSTEM DENSITY - REDUCE BACKGROUND SERVICES
# =============================================================================
systemd=false

# =============================================================================
# KERNEL PARAMETERS - LINUX KERNEL TUNING FOR MINIMAL FOOTPRINT
# =============================================================================
kernelCommandLine = "quiet loglevel=3"

# =============================================================================
# NOTE: For peripheral services only (Redis, monitoring, etc.)
# The core HFT Rust engine runs NATIVE on Windows for zero virtualization overhead
# =============================================================================
